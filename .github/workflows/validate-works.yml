name: Validate portfolio data

on:
  push:
    branches: [main]
    paths:
      - "data/works.json"
      - "scripts/validate-works.mjs"
  pull_request:
    paths:
      - "data/works.json"
      - "scripts/validate-works.mjs"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/validate-works.mjs
